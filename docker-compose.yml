services:
  backend:
    build:
      context: ./backend
    container_name: western-backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./western-library-1
    container_name: western-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
