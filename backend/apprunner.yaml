version: 1.0
runtime: nodejs20

build:
  commands:
    build:
      - npm ci --omit=dev

run:
  runtime-version: 20
  command: node index.js
  network:
    port: 3001
    env: PORT
  env:
    - name: PORT
      value: "3001"
    # The real secret values (REDIS_URL, APIFY_TOKEN, FRONTEND_ORIGIN) are
    # set through the App Runner console / CLI, not committed here.
